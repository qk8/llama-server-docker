version: "3.9"

services:
  comfyui:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: llama-server
    ports:
      - "8080:8080"
    volumes:
      - ~/containers/llama-server/models:/models
    command: >
      -m /models/Qwen3.5-9B-Q8_0.gguf
      --port 8080
      --host 0.0.0.0
      -n 512
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    networks:
      - llama-server-internal
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility

    security_opt:
      - no-new-privileges:true

    cap_drop:
      - ALL

    restart: unless-stopped

networks:
  llama-server-internal:
    internal: true