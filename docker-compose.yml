version: "3.9"

services:
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: llama-server
    ports:
      - "8080:8080"
    volumes:
      - ~/containers/llama-server/models:/models
    command: >
      -m /models/Qwen3.5-27B-Q3_K_M.gguf
      --n-gpu-layers all
      --ctx-size 16384
      --cache-type-k q8_0
      --cache-type-v q8_0
      --temp 0.6
      --top-p 0.95
      --top-k 20
      --min-p 0.0
      --presence-penalty 0.0
      --repeat-penalty 1.0
      --port 8080
      --host 0.0.0.0
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    networks:
      - llama-server-internal
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility

    security_opt:
      - no-new-privileges:true

    cap_drop:
      - ALL

    restart: unless-stopped

networks:
  llama-server-internal:
    internal: true